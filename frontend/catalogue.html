<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Catalogue - CineVerse</title>

    <!-- Icônes Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="./src/styles/styles.css">
    <link rel="stylesheet" href="./src/styles/header.css">
    <link rel="stylesheet" href="./src/styles/footer.css">
    <link rel="stylesheet" href="./src/styles/catalog.css">
    <link rel="stylesheet" href="./src/styles/movieModal.css">


</head>
<body>
<!-- HEADER -->
<header class="header"></header>

<!-- MAIN -->

<main class="catalogue-main">
    <div class="catalogue-container">
        <div class="catalogue-header">
            <h1>Catalogue des films</h1>
            <p class="catalogue-subtitle">Découvrez notre sélection de films populaires</p>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
        </div>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <div id="catalogue-grid" class="catalogue-grid">
        </div>

        <div id="pagination-controls" class="pagination-controls">
        </div>
    </div>
</main>


<div id="movie-modal" class="modal">
    <div class="modal-content">
        <button class="modal-close" id="modal-close">
            <i class="fas fa-times"></i>
        </button>
        <div class="modal-body">
            <div class="modal-poster">
                <img id="modal-image" src="" alt="">
            </div>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div class="modal-meta">
                    <span id="modal-year"></span>
                    <span id="modal-director"></span>
                </div>
                <div class="modal-overview">
                    <h3>Synopsis</h3>
                    <p id="modal-description"></p>
                </div>
                <div class="modal-details">
                    <p><strong>Genre:</strong> <span id="modal-genre"></span></p>
                    <p><strong>Durée:</strong> <span id="modal-duration"></span></p>
                    <p><strong>Note:</strong> <span id="modal-rating"></span></p>
                    <div>
                        <strong>Acteurs:</strong>
                        <div id="modal-actors">

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>



<!-- FOOTER -->
<footer class="cv-footer"></footer>

<!-- SCRIPTS -->
<script src="./src/scripts/header.js"></script>
<script src="./src/scripts/footer.js"></script>
<script src="./src/scripts/burger.js"></script>
<script type="module" src="./src/scripts/ui/catalogue.js"></script>
</body>
</html>
