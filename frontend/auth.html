<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineVerse | Authentification</title>
  <link rel="stylesheet" href="./src/styles/auth.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <h1 class="logo">🎬 <span>CineVerse</span></h1>

      <!-- Formulaire Connexion -->
      <form id="login-form" class="auth-form active" autocomplete="off">
        <h2>Connexion</h2>

        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="exemple@email.com" required />
        </div>

        <div class="input-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" placeholder="********" required />
        </div>

        <button type="submit" class="btn">Se connecter</button>

        <p class="switch-text">
          Pas encore de compte ?
          <a href="#" id="show-register">Créer un compte</a>
        </p>
      </form>

      <!-- Formulaire Inscription -->
      <form id="register-form" class="auth-form hidden" autocomplete="off">
        <h2>Créer un compte</h2>

        <div class="input-group">
          <label for="register-username">Nom d'utilisateur</label>
          <input type="text" id="register-username" placeholder="Votre pseudo" required />
        </div>

        <div class="input-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" placeholder="exemple@email.com" required />
        </div>

        <div class="input-group">
          <label for="register-password">Mot de passe</label>
          <input type="password" id="register-password" placeholder="********" required />
        </div>

        <button type="submit" class="btn">S'inscrire</button>

        <p class="switch-text">
          Déjà un compte ?
          <a href="#" id="show-login">Se connecter</a>
        </p>
      </form>
    </section>
  </main>

  <script src="./src/scripts/ui/auth.js" defer></script>
</body>
</html>
